# Purrbo — nginx site cho VPS. Copy vào /etc/nginx/sites-available/purrbo.fun
# rồi bật (xem lệnh trong DEPLOY.md). App Docker publish ở 127.0.0.1:3012.
# HTTPS: chạy `certbot --nginx -d purrbo.fun -d www.purrbo.fun` (tự thêm block 443 + redirect).
server {
    listen 80;
    listen [::]:80;
    server_name purrbo.fun www.purrbo.fun;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
