# Dev — Postgres + API (Docker). Phone gọi vào :8000 như cũ.
# Chạy:  docker compose up --build   (thêm -d để chạy nền)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: purrbo
      POSTGRES_PASSWORD: purrbo
      POSTGRES_DB: purrbo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purrbo"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://purrbo:purrbo@db:5432/purrbo
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
