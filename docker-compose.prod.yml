# Prod — Postgres + API. Web/API publish ở 127.0.0.1:3012 (chỉ localhost).
# Nginx CỦA VPS (sites-available) reverse-proxy purrbo.fun → 127.0.0.1:3012 + TLS (certbot).
# Chạy:  ./deploy.sh
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: purrbo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purrbo}
      POSTGRES_DB: purrbo
    # Tuning cho VPS 2GB (chống OOM + tận dụng cache hợp lý).
    command: >
      postgres -c shared_buffers=256MB -c effective_cache_size=512MB
      -c work_mem=8MB -c max_connections=100
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purrbo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 700m

  api:
    build: .
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://purrbo:${POSTGRES_PASSWORD:-purrbo}@db:5432/purrbo
    ports:
      - "127.0.0.1:${APP_PORT:-3012}:8000"   # chỉ localhost → nginx VPS proxy vào
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 1100m

volumes:
  pgdata:
