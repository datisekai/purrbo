# Prod — Postgres + API + Caddy (reverse proxy + HTTPS TỰ ĐỘNG cho purrbo.fun).
# Chạy:  ./deploy.sh   (hoặc: POSTGRES_PASSWORD=... docker compose -f docker-compose.prod.yml up --build -d)
#
# Caddy tự xin & gia hạn chứng chỉ Let's Encrypt cho purrbo.fun — KHÔNG cần certbot thủ công.
# Điều kiện: DNS purrbo.fun (+ www) trỏ A record về IP VPS, và mở cổng 80 + 443.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: purrbo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purrbo}
      POSTGRES_DB: purrbo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purrbo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://purrbo:${POSTGRES_PASSWORD:-purrbo}@db:5432/purrbo
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # lưu chứng chỉ TLS (giữ qua mỗi lần deploy)
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
